name: Quality Reports → GitHub Pages

on:
  push:
    branches: [main, claude/java-code-quality-setup-TWXXE]
  workflow_dispatch:

# Required for pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-flight runs on new push
# Scoped to main so feature-branch builds don't compete with live deployments
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build + analyze ───────────────────────────────────────────────────────
  build:
    name: Build & run quality tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run all quality tools + landscape rollup
        # ignoreFailures=true on all tools and tests, so this always succeeds
        run: ./gradlew qualityLandscape

      - name: Assemble site
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHA_SHORT=${GITHUB_SHA::7}

          mkdir -p site/checkstyle site/pmd site/spotbugs site/jacoco site/tests site/landscape

          # ── per-tool HTML reports ──────────────────────────────────────────
          cp build/reports/checkstyle/main.html  site/checkstyle/main.html
          cp build/reports/checkstyle/test.html  site/checkstyle/test.html  2>/dev/null || true
          cp build/reports/pmd/main.html         site/pmd/main.html
          cp build/reports/pmd/test.html         site/pmd/test.html         2>/dev/null || true
          cp build/reports/spotbugs/main.html    site/spotbugs/main.html
          cp build/reports/spotbugs/test.html    site/spotbugs/test.html    2>/dev/null || true

          # ── JaCoCo is a full multi-file site ──────────────────────────────
          cp -r build/reports/jacoco/test/html/. site/jacoco/

          # ── JUnit test results ────────────────────────────────────────────
          cp -r build/reports/tests/test/.        site/tests/

          # ── Per-class landscape (self-contained HTML + source JSONs) ─────────
          cp build/reports/quality-landscape/index.html site/landscape/index.html
          if [ -d build/reports/quality-landscape/sources ]; then
            mkdir -p site/landscape/sources
            cp -r build/reports/quality-landscape/sources/. site/landscape/sources/
          fi

          # ── Dashboard index ───────────────────────────────────────────────
          sed \
            -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
            -e "s|__SHA_SHORT__|${SHA_SHORT}|g" \
            site-template/index.html > site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
